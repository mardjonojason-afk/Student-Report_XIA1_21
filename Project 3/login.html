<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        :root{ 
            --c1: #081016;
            --c2: #072632;
            --c3: #F3E3D0;
            --c4: #D2C4B4;
        }

        html {
            scroll-behavior: smooth;
        }
        
        body{ 
            background: linear-gradient(180deg, var(--c2) 0%, #fff 40%); 
        }

        img.me-2{
            width: 40px;
            height: 40px;
            object-fit: contain;
        }
       
        .navbar, .footer{ 
            background-color: var(--c1); 
        }

        .btn-primary{ 
            background-color: var(--c4); 
            border-color: var(--c4); 
            color:#222; 
        }

        .login-card{ 
            max-width:420px; 
            margin: 6rem auto; 
        }

    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <img src="media/logo.png" alt="Logo" class="me-2" >
            <a class="navbar-brand" href="index.html">Audio Bible</a>
        </div>
    </nav>

    <div class="card login-card shadow-sm">
        <div class="card-body">
            <h3 class="card-title mb-3">Sign in</h3>
            <form>
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" required>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <a href="#">Forgot?</a>
                </div>
                <button class="btn btn-primary w-100" type="submit">Login</button>
            </form>
            <hr>
            <p class="text-center">Don't have an account? <a href="#">Register</a></p>
        </div>
    </div>

    <footer class="footer text-center text-white py-3">
        <div class="container">&copy; Audio Bible — Your one-stop shop for the best audio products.</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
