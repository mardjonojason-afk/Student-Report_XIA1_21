<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        :root{ 
            --c1: #081016;
            --c2: #072632;
            --c3: #F3E3D0;
            --c4: #D2C4B4; 
        }

        html {
            scroll-behavior: smooth;
        }
        
        body{ 
            background: linear-gradient(180deg, var(--c2) 0%, #fff 10%); 
        }

        img.me-2{
            width: 40px;
            height: 40px;
            object-fit: contain;
        }
       
        .navbar, .footer{ 
            background-color: var(--c1); 
        }
        .btn-primary{ 
            background-color: var(--c4); 
            border-color: var(--c4); 
            color:#222; 
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <img src="media/logo.png" alt="Logo" class="me-2" >
            <a class="navbar-brand" href="index.html">Audio Bible</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#items">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link position-relative" href="checkout.html">Cart <span id="cart-count" class="badge bg-danger rounded-pill ms-2">0</span></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row g-4">
            <div class="col-lg-7">
                <h2>Billing & Shipping</h2>
                <form>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">First name</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Last name</label>
                            <input type="text" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" placeholder="Menteng Raya St No. 64" required>
                    </div>

                    <div class="row">
                        <div class="col-md-5 mb-3">
                            <label class="form-label">Country</label>
                            <select class="form-select" required>
                                <option>Indonesia</option>
                                <option>Malaysia</option>
                                <option>Singapore</option>
                                <option>Brunei</option>
                                <option>Thailand</option>
                                <option>Philippines</option>
                                <option>Vietnam</option>
                                <option>Myanmar</option>
                                <option>Laos</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Zip Code</label>
                            <input type="text" class="form-control" required>
                        </div>
                    </div>

                    <h3 class="mt-4">Payment</h3>
                    <div class="mb-3">
                        <label class="form-label">Cardholder name</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">Card number</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="col-md-2 mb-3">
                            <label class="form-label">MM/YY</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="col-md-2 mb-3">
                            <label class="form-label">CVC</label>
                            <input type="text" class="form-control" required>
                        </div>
                    </div>

                    <button class="btn btn-primary btn-lg mt-3" type="submit">Place order</button>
                </form>
            </div>

            <div class="col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Order Summary</h5>
                        <div id="order-items"></div>
                        <hr>
                        <p>Shipping: <span id="shipping">Rp 150.000</span></p>
                        <h4>Total: <span id="order-total">Rp 0</span></h4>
                        <a href="#" id="clear-cart" class="btn btn-outline-secondary mt-3">Clear cart</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer text-center text-white py-3">
        <div class="container">&copy; Audio Bible — Your one-stop shop for the best audio products.</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        function getCart(){ return JSON.parse(localStorage.getItem('cart')||'[]'); }
        function saveCart(cart){ localStorage.setItem('cart', JSON.stringify(cart)); updateCartCount(); }
        function updateCartCount(){ const cart=getCart(); const count=cart.reduce((s,i)=>s+(i.qty||1),0); const el=document.getElementById('cart-count'); if(el) el.textContent=count; }

        function formatIDR(value){
            try{
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(value);
            }catch(e){ return 'Rp ' + (value).toLocaleString(); }
        }

        function renderOrder(){
            const container = document.getElementById('order-items');
            const cart = getCart();
            container.innerHTML = '';
            if(cart.length===0){ container.innerHTML = '<p>Your cart is empty.</p>'; document.getElementById('order-total').textContent=formatIDR(0); return; }
            let subtotal = 0;
            cart.forEach((item, idx)=>{
                const row = document.createElement('div');
                row.className = 'd-flex align-items-center mb-3';
                row.innerHTML = `
                    <img src="${item.image}" alt="" style="width:64px;height:64px;object-fit:cover;border-radius:6px;margin-right:12px;">
                    <div class="flex-grow-1">
                        <div class="fw-bold">${item.title}</div>
                        <div>${formatIDR(item.price)} each</div>
                        <div class="mt-2">
                            <input type="number" min="1" value="${item.qty||1}" data-idx="${idx}" class="form-control form-control-sm qty-input" style="width:90px;display:inline-block;" />
                            <button class="btn btn-sm btn-outline-danger ms-2 remove-item" data-idx="${idx}">Remove</button>
                        </div>
                    </div>
                    <div class="text-end fw-bold">${formatIDR(item.price*(item.qty||1))}</div>
                `;
                container.appendChild(row);
                subtotal += item.price*(item.qty||1);
            });
            const shipping = 25000;
            document.getElementById('shipping').textContent = formatIDR(shipping);
            document.getElementById('order-total').textContent = formatIDR(subtotal+shipping);

            document.querySelectorAll('.remove-item').forEach(btn=> btn.addEventListener('click', ()=>{
                const idx = Number(btn.dataset.idx);
                const cart = getCart(); cart.splice(idx,1); saveCart(cart); renderOrder();
            }));
            document.querySelectorAll('.qty-input').forEach(input=> input.addEventListener('change', ()=>{
                const idx = Number(input.dataset.idx); const val = Math.max(1, Number(input.value)||1);
                const cart = getCart(); cart[idx].qty = val; saveCart(cart); renderOrder();
            }));
        }

        document.addEventListener('DOMContentLoaded', ()=>{
            updateCartCount();
            renderOrder();
            const clearBtn = document.getElementById('clear-cart');
            clearBtn.addEventListener('click', (e)=>{ e.preventDefault(); localStorage.removeItem('cart'); updateCartCount(); renderOrder(); });
        });
    </script>
</body>
</html>
