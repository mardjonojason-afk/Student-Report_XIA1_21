<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout – Allesio</title>
    <link rel="stylesheet" href="checkout.css">
</head>
<body>
<header>
    <div style="display:flex;align-items:center;gap:12px;"><a href="index.html"><img src="images/logo.png" alt="Allesio" style="height:36px"></a><h2>Checkout</h2></div>
    <a href="index.html" style="color:white;text-decoration:none;">⬅ Kembali</a>
</header>

<main class="checkout-container" style="max-width:900px;margin:28px auto;">
    <h3>Ringkasan Keranjang</h3>
    <ul id="checkoutCartList"></ul>
    <p class="total">Total: <span id="checkoutTotal">Rp0</span></p>

    <h3>Data Pembayaran</h3>
    <form id="checkoutForm">
        <label>Nama Lengkap</label>
        <input type="text" id="fullName" required>

        <label>Alamat</label>
        <textarea id="address" rows="3" required></textarea>

        <label>Nomor Kartu Kredit</label>
        <input type="text" id="cardNumber" maxlength="16" required>

        <label>CVV</label>
        <input type="password" id="cvv" maxlength="3" required>

        <button type="submit" id="placeOrder">Pesan Sekarang</button>
    </form>
</main>

<script src="checkout.js"></script>
</body>
</html>
